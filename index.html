<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>My Jigsaw Puzzle - 写真でジグソーパズル</title>
<meta name="description" content="好きな写真をアップロードして自分だけのジグソーパズルを作って遊べるゲーム">
<meta name="theme-color" content="#1d1537">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ジグソーパズル">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 背景シーン: 常夏の夕暮れの海 ===== -->
<div class="scene" aria-hidden="true">
  <div class="scene-stars stars-1"></div>
  <div class="scene-stars stars-2"></div>
  <div class="scene-cloud cloud-1"></div>
  <div class="scene-cloud cloud-2"></div>
  <div class="scene-cloud cloud-3"></div>
  <div class="scene-sun"></div>
  <div class="scene-sea">
    <div class="scene-reflection"></div>
  </div>
  <div class="scene-palm palm-1">🌴</div>
  <div class="scene-palm palm-2">🌴</div>
  <div class="scene-grain"></div>
  <div class="scene-vignette"></div>
</div>

<!-- ===== セットアップ画面 ===== -->
<div id="setup-screen" class="screen">
  <header class="setup-header">
    <h1><span class="title-icon">🧩</span>My Jigsaw Puzzle</h1>
    <p>夕暮れの海辺で、大切な思い出をもういちど。</p>
  </header>

  <div class="setup-card">
    <!-- 画像選択 -->
    <div id="dropzone" class="dropzone">
      <input type="file" id="file-input" accept="image/*" hidden>
      <div id="dropzone-empty">
        <div class="dropzone-icon">📷</div>
        <p class="dropzone-title">写真を選ぶ</p>
        <p class="muted">タップして選択、またはドラッグ&ドロップ</p>
      </div>
      <div id="dropzone-preview" hidden>
        <img id="preview-img" alt="選択した画像">
        <button id="change-image-btn" class="btn btn-small" type="button">別の写真にする</button>
      </div>
    </div>

    <button id="sample-btn" class="btn btn-ghost" type="button"><span>🎨</span>サンプル画像で遊ぶ</button>

    <!-- 難易度 -->
    <div class="difficulty">
      <h2>ピースの数</h2>
      <div id="difficulty-buttons" class="difficulty-buttons">
        <button class="diff-btn" data-pieces="12" type="button"><span class="diff-count">12</span><span class="diff-label">かんたん</span></button>
        <button class="diff-btn selected" data-pieces="24" type="button"><span class="diff-count">24</span><span class="diff-label">ふつう</span></button>
        <button class="diff-btn" data-pieces="54" type="button"><span class="diff-count">54</span><span class="diff-label">むずかしい</span></button>
        <button class="diff-btn" data-pieces="96" type="button"><span class="diff-count">96</span><span class="diff-label">達人</span></button>
        <button class="diff-btn" data-pieces="192" type="button"><span class="diff-count">192</span><span class="diff-label">鬼</span></button>
      </div>
    </div>

    <button id="start-btn" class="btn btn-primary" type="button" disabled>スタート!</button>
  </div>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="game-screen" class="screen" hidden>
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="logo">🧩</span>
      <span id="stat-time" class="stat" title="経過時間">⏱ 0:00</span>
      <span id="stat-pieces" class="stat" title="はめたピース">✅ 0 / 0</span>
    </div>
    <div class="toolbar-right">
      <button id="hint-btn" class="btn btn-small" type="button" title="盤面にうっすら完成図を表示"><span>💡</span><span class="btn-label">ヒント</span></button>
      <button id="peek-btn" class="btn btn-small" type="button" title="完成図を見る"><span>🖼</span><span class="btn-label">完成図</span></button>
      <button id="shuffle-btn" class="btn btn-small" type="button" title="ピースをばらまき直す"><span>🔀</span><span class="btn-label">シャッフル</span></button>
      <button id="new-btn" class="btn btn-small" type="button" title="別の写真・難易度でやり直す"><span>🏠</span><span class="btn-label">新しいパズル</span></button>
    </div>
  </div>
  <div id="game-main" class="game-main">
    <canvas id="game-canvas"></canvas>
  </div>
</div>

<!-- 完成図モーダル -->
<div id="peek-modal" class="modal" hidden>
  <div class="modal-body">
    <img id="peek-img" alt="完成図">
    <p class="muted">クリックで閉じる</p>
  </div>
</div>

<!-- クリア画面 -->
<div id="clear-overlay" class="modal" hidden>
  <div class="modal-body clear-body">
    <h2>🌅 完成!おめでとう!</h2>
    <p class="clear-sub">また一つ、心に残る風景ができました。</p>
    <p id="clear-stats"></p>
    <div class="clear-buttons">
      <button id="clear-again-btn" class="btn" type="button">🔁 同じパズルをもう一度</button>
      <button id="clear-new-btn" class="btn btn-primary" type="button">🏠 新しいパズル</button>
    </div>
  </div>
</div>

<script src="puzzle.js"></script>
</body>
</html>
